<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<title>工場改善プロジェクト 進捗管理ダッシュボード</title>

<style>
:root{
  --bg:#f4f5f7; --card:#ffffff; --border:#e3e5ea; --text:#1f2430; --muted:#6b7280;
  --navy:#1E2761; --ice:#CADCFC;
  --c-michaku:#9ca3af; --c-kento:#8b5cf6; --c-jisshi:#3b82f6; --c-kouka:#f59e0b;
  --c-hyojun:#14b8a6; --c-kanryo:#22c55e; --c-danger:#ef4444; --c-warn:#f59e0b;
}
*{box-sizing:border-box}
body{margin:0;font-family:"Yu Gothic UI","Meiryo",sans-serif;background:var(--bg);color:var(--text);font-size:14px;line-height:1.6}
header{background:var(--navy);color:#fff;padding:22px 28px}
header h1{margin:0 0 4px;font-size:22px;font-weight:700}
header p{margin:0;color:var(--ice);font-size:13px}
.wrap{max-width:1280px;margin:0 auto;padding:20px 24px 60px}
.summary{display:grid;grid-template-columns:repeat(6,1fr);gap:10px;margin-bottom:18px}
.sum-card{background:var(--card);border:1px solid var(--border);border-radius:10px;padding:12px 14px;text-align:center}
.sum-card .num{font-size:24px;font-weight:700}
.sum-card .lbl{font-size:12px;color:var(--muted);margin-top:2px}
.loc-summary{display:flex;gap:10px;margin-bottom:18px;flex-wrap:wrap}
.loc-card{flex:1;min-width:200px;background:var(--card);border:1px solid var(--border);border-radius:10px;padding:12px 14px}
.loc-card .name{font-weight:700;font-size:13px;margin-bottom:6px}
.loc-bar{height:8px;border-radius:4px;overflow:hidden;display:flex;background:#eee}
.loc-bar span{height:100%}
.loc-meta{font-size:11px;color:var(--muted);margin-top:4px}

.panel{background:var(--card);border:1px solid var(--border);border-radius:10px;margin-bottom:18px;overflow:hidden}
.panel-head{padding:12px 16px;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;cursor:pointer;background:#fafbfc}
.panel-head h2{margin:0;font-size:15px}
.panel-body{padding:14px 16px}
.risk-row{display:flex;gap:10px;padding:8px 0;border-bottom:1px dashed var(--border);font-size:13px;align-items:flex-start}
.risk-row:last-child{border-bottom:none}
.risk-id{flex:0 0 46px;font-weight:700;color:var(--navy)}
.risk-title{flex:0 0 220px;font-weight:600}
.risk-text{flex:1;color:#444}
.risk-due{flex:0 0 110px;text-align:right;font-size:12px}
.overdue{color:var(--c-danger);font-weight:700}
.soon{color:var(--c-warn);font-weight:700}

.toolbar{display:flex;flex-wrap:wrap;gap:8px;align-items:center;margin-bottom:14px}
.tabs{display:flex;gap:6px;flex-wrap:wrap}
.tab-btn{border:1px solid var(--border);background:#fff;border-radius:20px;padding:6px 14px;font-size:12.5px;cursor:pointer;color:#444}
.tab-btn.active{background:var(--navy);color:#fff;border-color:var(--navy)}
.chip{border:1px solid var(--border);background:#fff;border-radius:20px;padding:5px 12px;font-size:12px;cursor:pointer;color:#444;user-select:none}
.chip.active{color:#fff;border-color:transparent}
input[type=search]{border:1px solid var(--border);border-radius:20px;padding:6px 14px;font-size:12.5px;min-width:220px}
.spacer{flex:1}
.btn{border:1px solid var(--border);background:#fff;border-radius:8px;padding:7px 12px;font-size:12.5px;cursor:pointer;color:#333}
.btn:hover{background:#f0f1f3}
.btn.danger{color:var(--c-danger);border-color:#f3c9c9}

.list{display:flex;flex-direction:column;gap:12px}
.card{background:var(--card);border:1px solid var(--border);border-radius:12px;padding:16px 18px}
.card.overdue-card{border-color:#f3c2c2}
.card-top{display:flex;align-items:flex-start;gap:10px;flex-wrap:wrap}
.idtag{background:var(--navy);color:#fff;border-radius:6px;padding:2px 8px;font-size:12px;font-weight:700}
.loctag{background:#eef1fb;color:var(--navy);border-radius:6px;padding:2px 8px;font-size:11.5px;font-weight:600}
.cattag{background:#f3f3f5;color:#555;border-radius:6px;padding:2px 8px;font-size:11.5px}
select.loctag{border:none;font-family:inherit;cursor:pointer}
input.cattag{border:none;font-family:inherit;width:110px}
.title{font-size:15.5px;font-weight:700;margin:8px 0 4px;flex-basis:100%}
.title-input{font-size:15.5px;font-weight:700;margin:8px 0 4px;flex-basis:100%;border:none;background:transparent;border-bottom:1px dashed transparent;padding:2px 0;font-family:inherit;color:var(--text);width:100%}
.title-input:hover{border-bottom-color:var(--border)}
.title-input:focus{outline:none;border-bottom-color:var(--navy)}
.meta-line{font-size:12.5px;color:var(--muted);display:flex;gap:16px;flex-wrap:wrap;margin-bottom:10px;align-items:center}
.meta-line b{color:#333;font-weight:600}
.meta-line input, .meta-line select{border:1px solid var(--border);border-radius:6px;padding:2px 6px;font-size:12.5px;font-family:inherit}
.del-task{color:var(--c-danger);cursor:pointer;font-size:11.5px;margin-left:auto}

.badge{display:inline-flex;align-items:center;gap:5px;border-radius:16px;padding:4px 12px;font-size:12.5px;font-weight:700;color:#fff}
.grid2{display:grid;grid-template-columns:1fr 1fr;gap:14px;margin-top:10px}
@media (max-width:860px){.grid2{grid-template-columns:1fr}}
.field-label{font-size:11px;font-weight:700;color:var(--muted);text-transform:uppercase;letter-spacing:.03em;margin-bottom:4px}
.box{background:#f8f9fb;border:1px solid var(--border);border-radius:8px;padding:10px 12px}
.box.criteria{background:#eef8f4;border-color:#cdeade}
.box.risk{background:#fff6ec;border-color:#f3ddb8}
textarea{width:100%;border:none;background:transparent;resize:vertical;font-family:inherit;font-size:13px;min-height:44px;padding:0}
textarea:focus{outline:1px solid var(--navy);border-radius:4px}
.milestone-input{flex:1;min-width:200px}
.cost-input{border:1px solid var(--border);border-radius:6px;padding:5px 8px;font-family:inherit;font-size:12.5px;width:140px;box-sizing:border-box}

.log-toggle{margin-top:10px;font-size:12.5px;color:var(--navy);cursor:pointer;font-weight:600}
.log-section{display:none;margin-top:10px;border-top:1px solid var(--border);padding-top:10px}
.log-section.open{display:block}
.log-form{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:10px}
.log-form textarea{background:#fff;border:1px solid var(--border);border-radius:6px;padding:6px 8px;min-height:36px}
.log-form input{background:#fff;border:1px solid var(--border);border-radius:6px;padding:6px 8px;font-family:inherit;font-size:13px;width:100%;box-sizing:border-box}
.log-form label{font-size:11px;color:var(--muted);display:block;margin-bottom:2px}
.log-entries{display:flex;flex-direction:column;gap:8px}
.log-entry{background:#fbfbfc;border:1px solid var(--border);border-radius:8px;padding:8px 10px;font-size:12.5px}
.log-entry .date{font-weight:700;color:var(--navy);margin-bottom:4px;display:flex;justify-content:space-between}
.log-entry .del{color:var(--c-danger);cursor:pointer;font-weight:400;font-size:11px}
.log-entry dl{margin:0;display:grid;grid-template-columns:90px 1fr;gap:2px 8px}
.log-entry dt{color:var(--muted)}
.log-entry dd{margin:0}
footer{text-align:center;color:var(--muted);font-size:11.5px;padding:20px}
.empty{text-align:center;color:var(--muted);padding:30px}

.attach-subtitle{font-size:11px;font-weight:700;color:var(--muted);margin:0 0 6px}
.attach-subtitle:not(:first-child){margin-top:14px}
.attach-empty{color:var(--muted);font-size:12px;margin-bottom:8px}

.attach-files{display:flex;flex-wrap:wrap;gap:10px;margin-bottom:10px}
.attach-item{width:104px;text-align:center;font-size:11px;background:#fff;border:1px solid var(--border);border-radius:8px;padding:6px}
.attach-thumb{width:90px;height:90px;object-fit:cover;border-radius:6px;cursor:pointer;display:block;margin:0 auto 4px;background:#eee}
.attach-file-icon{font-size:34px;cursor:pointer;margin-bottom:4px;line-height:1}
.attach-name{white-space:nowrap;overflow:hidden;text-overflow:ellipsis;font-size:11px}
.attach-size{color:var(--muted);font-size:10px}
.attach-del{color:var(--c-danger);cursor:pointer;font-size:10.5px;display:block;margin-top:2px}
.lightbox{display:none;position:fixed;inset:0;background:rgba(0,0,0,.85);z-index:1000;align-items:center;justify-content:center;cursor:zoom-out}
.lightbox.open{display:flex}
.lightbox img{max-width:90%;max-height:90%;border-radius:6px}

.attach-list{display:flex;flex-direction:column;gap:6px;margin-bottom:10px}
.attach-row{display:flex;align-items:center;gap:8px;background:#fff;border:1px solid var(--border);border-radius:8px;padding:6px 10px}
.attach-row a{color:var(--navy);text-decoration:none;font-weight:600;font-size:12.5px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.attach-row a:hover{text-decoration:underline}
.attach-row .attach-del{margin-top:0}
.attach-icon{font-size:15px;flex:0 0 auto}
.attach-url{color:var(--muted);font-size:11px;flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.attach-form{display:flex;gap:6px;flex-wrap:wrap}
.attach-form input{border:1px solid var(--border);border-radius:6px;padding:5px 8px;font-size:12.5px;font-family:inherit}
.attach-form input.label{flex:0 0 180px}
.attach-form input.url{flex:1;min-width:200px}
</style>
</head>

    <div class="panel-body" id="riskBody"></div>

    <button class="btn" onclick="exportJSON()">JSONエクスポート</button>
    <button class="btn" onclick="document.getElementById('importFile').click()">JSONインポート</button>
    <input type="file" id="importFile" accept="application/json" style="display:none" onchange="importJSON(event)">
    <button class="btn danger" onclick="resetData()">初期データに戻す</button>
  </div>

  <div class="list" id="list"></div>
  <div class="empty" id="emptyMsg" style="display:none">条件に一致する項目がありません</div>

  <footer>編集内容はこのブラウザに自動保存されます（localStorage）。アップロードしたファイルはこのブラウザのローカルデータベースに保存され、他端末では見えません（JSONエクスポートにも含まれません）。添付リンクは各項目のデータに含まれるため「JSONエクスポート」で他端末にも引き継げます。共同編集したい場合はクラウドリンクの利用をおすすめします。</footer>
</div>

<div id="lightbox" class="lightbox" onclick="closeLightbox()"><img id="lightboxImg"></div>

async function spSaveItem(item){
  const res = await fetch(SP_SAVE_URL, {
    method:"POST", headers:{"Content-Type":"application/json"},
    body: JSON.stringify({taskId:item.id, title:item.title||"(無題)", dataJson:JSON.stringify(item)})

}

  const res = await fetch(SP_DELETE_URL, {

}

}

function spItemsToLocal(spItems){
  return spItems.map(r=> JSON.parse(r.DataJson)).sort((a,b)=>a.id-b.id);
}

async function initSharePointSync(){
  try{
    setSyncStatus("syncing");
    const remote = spItemsToLocal(await spGetAllItems());
    if(remote.length===0){
      for(const it of items){ await spSaveItem(it); }
    } else {
      items = remote;
      saveState();
    }
    spEnabled = true;
    setSyncStatus("online");
    renderAll();
    if(!pollTimer) pollTimer = setInterval(pollSharePoint, SP_POLL_INTERVAL_MS);
  }catch(e){
    spEnabled = false;
    setSyncStatus("offline");
    console.warn("SharePoint同期が利用できません。ローカル保存のみで動作します。", e);
  }
}

function isUserEditingCard(id){
  const active = document.activeElement;
  if(!active) return false;
  const card = document.getElementById("card-"+id);
  return !!(card && card.contains(active));
}
function isUserEditingAnyCard(){
  const active = document.activeElement;
  return !!(active && active.closest && active.closest(".card"));
}

async function pollSharePoint(){
  if(!spEnabled) return;
  try{
    const spItems = await spGetAllItems();
    const remoteMap = {};
    spItems.forEach(r=>{
      const obj = JSON.parse(r.DataJson);
      remoteMap[obj.id] = obj;
    });
    let changed = false;
    Object.values(remoteMap).forEach(robj=>{
      if(isUserEditingCard(robj.id)) return;
      const idx = items.findIndex(i=>i.id===robj.id);
      const localStr = idx>=0? JSON.stringify(items[idx]) : null;
      if(localStr !== JSON.stringify(robj)){
        if(idx>=0) items[idx] = robj; else items.push(robj);
        changed = true;
        refreshCardIfPresent(robj.id);
      }
    });
    if(!isUserEditingAnyCard()){
      const remoteIds = new Set(Object.keys(remoteMap).map(Number));
      const before = items.length;
      items = items.filter(i=>remoteIds.has(i.id));
      if(items.length!==before){ changed = true; renderList(); }
    }
    if(changed){
      saveState();
      renderSummary(); renderLocSummary(); renderRiskPanel(); renderTabs();
    }
    setSyncStatus("online");
  }catch(e){
    setSyncStatus("error");
  }
}

function refreshCardIfPresent(id){
  const el = document.getElementById("card-"+id);
  const item = items.find(i=>i.id===id);
  if(el && item){
    el.outerHTML = cardHtml(item);
  } else {
    renderList();
  }
}

function fmtDate(iso){
  if(!iso) return "未設定";
  const d = new Date(iso+"T00:00:00");
  return `${d.getFullYear()}/${d.getMonth()+1}/${d.getDate()}`;
}
function daysUntil(iso){
  if(!iso) return null;
  const today = new Date(); today.setHours(0,0,0,0);
  const d = new Date(iso+"T00:00:00");
  return Math.round((d-today)/86400000);
}

function renderSummary(){
  const el = document.getElementById("summary");
  el.innerHTML = STATUS_STAGES.map(s=>{
    const n = items.filter(i=>i.status===s).length;
    return `<div class="sum-card"><div class="num" style="color:${STATUS_COLORS[s]}">${n}</div><div class="lbl">${s}</div></div>`;
  }).join("");
}

function renderLocSummary(){
  const el = document.getElementById("locSummary");
  el.innerHTML = getLocations().map(loc=>{
    const list = items.filter(i=>i.location===loc);
    const total = list.length;
    const doneN = list.filter(i=>i.status==="完了").length;
    const bars = STATUS_STAGES.map(s=>{
      const n = list.filter(i=>i.status===s).length;
      const pct = total? (n/total*100):0;
      return pct? `<span style="width:${pct}%;background:${STATUS_COLORS[s]}"></span>`:"";
    }).join("");
    return `<div class="loc-card">
      <div class="name">${loc}（${total}件）</div>
      <div class="loc-bar">${bars}</div>
      <div class="loc-meta">完了 ${doneN}/${total}</div>
    </div>`;
  }).join("");
}

const RISK_DUE_THRESHOLD_DAYS = 10;

function riskItems(){
  return items.filter(i=>{
    const du = daysUntil(i.dueDate);
    return du!==null && du<=RISK_DUE_THRESHOLD_DAYS && i.status!=="完了";
  }).sort((a,b)=>{
    const da=daysUntil(a.dueDate), db=daysUntil(b.dueDate);
    return (da===null?9999:da)-(db===null?9999:db);
  });
}

function renderRiskPanel(){
  const list = riskItems();
  document.getElementById("riskCount").textContent = list.length;
  const body = document.getElementById("riskBody");
  if(list.length===0){ body.innerHTML = `<div class="empty">現在フラグの立っているリスクはありません</div>`; return; }
  body.innerHTML = list.map(i=>{
    const du = daysUntil(i.dueDate);
    let dueCls="", dueLabel=fmtDate(i.dueDate);
    if(du!==null){
      if(du<0){dueCls="overdue"; dueLabel += `（${-du}日超過）`;}
      else if(du<=RISK_DUE_THRESHOLD_DAYS){dueCls="soon"; dueLabel += `（残り${du}日）`;}
    }
    const hasRisk = i.risk && i.risk.trim()!=="";
    const riskHtml = hasRisk
      ? escapeHtml(i.risk)
      : `<span style="color:var(--muted);font-style:italic">リスク未記入（期限が近いため表示）</span>`;
    return `<div class="risk-row">
      <div class="risk-id">ID${i.id}</div>
      <div class="risk-title">${escapeHtml(i.title)}</div>
      <div class="risk-text">${riskHtml}</div>
      <div class="risk-due ${dueCls}">${dueLabel}</div>
    </div>`;
  }).join("");
}

function toggleRiskPanel(){
  const body = document.getElementById("riskBody");
  const caret = document.getElementById("riskCaret");
  const collapsed = body.style.display==="none";
  body.style.display = collapsed? "block":"none";
  caret.textContent = collapsed? "▾":"▸";
}

function renderTabs(){
  const locEl = document.getElementById("locTabs");
  const locs = ["すべて",...getLocations()];
  locEl.innerHTML = locs.map(l=>`<button class="tab-btn ${l===filterLoc?'active':''}" onclick="setLoc('${l.replace(/'/g,"&#39;")}')">${l}</button>`).join("");

  const stEl = document.getElementById("statusChips");
  stEl.innerHTML = STATUS_STAGES.map(s=>{
    const active = filterStatus.has(s);
    return `<span class="chip ${active?'active':''}" style="${active?`background:${STATUS_COLORS[s]}`:''}" onclick="toggleStatus('${s}')">${s}</span>`;
  }).join("") + `<span class="chip" onclick="toggleRiskOnly()" style="${riskOnly?'background:#ef4444;color:#fff;border-color:transparent':''}">要フォローのみ</span>`;
}

function setLoc(l){ filterLoc=l; renderTabs(); renderList(); }
function toggleStatus(s){
  if(filterStatus.has(s)) filterStatus.delete(s); else filterStatus.add(s);
  renderTabs(); renderList();
}
function toggleRiskOnly(){ riskOnly=!riskOnly; renderTabs(); renderList(); }

function escapeHtml(s){
  return (s||"").replace(/[&<>"']/g, c=>({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;","'":"&#39;"}[c]));
}

function renderList(){
  const q = document.getElementById("searchBox").value.trim().toLowerCase();
  let filtered = items.filter(i=>{
    if(filterLoc!=="すべて" && i.location!==filterLoc) return false;
    if(!filterStatus.has(i.status)) return false;
    if(riskOnly && (!i.risk || i.risk.trim()==="")) return false;
    if(q){
      const hay = `${i.id} ${i.title} ${i.assignee} ${i.content} ${i.category}`.toLowerCase();
      if(!hay.includes(q)) return false;
    }
    return true;
  });
  const listEl = document.getElementById("list");
  document.getElementById("emptyMsg").style.display = filtered.length? "none":"block";
  listEl.innerHTML = filtered.map(cardHtml).join("");
}

function toggleLog(id){
  const el = document.getElementById("log-"+id);
  el.classList.toggle("open");
}

function addLog(id){
  const item = items.find(i=>i.id===id);
  const reporter = document.getElementById("lr-"+id).value.trim();
  const progress = document.getElementById("lp-"+id).value.trim();
  const issue = document.getElementById("li-"+id).value.trim();
  const next = document.getElementById("ln-"+id).value.trim();
  const dueChange = document.getElementById("ld-"+id).value.trim();
  if(!reporter && !progress && !issue && !next && !dueChange) return;
  const today = new Date();
  const dateStr = `${today.getFullYear()}/${today.getMonth()+1}/${today.getDate()}`;
  item.weeklyLog = item.weeklyLog||[];
  item.weeklyLog.push({date:dateStr, reporter, progress, issue, next, dueChange});
  persistItem(item);
  renderList();
  document.getElementById("log-"+id).classList.add("open");
}

function deleteLog(id, idx){
  const item = items.find(i=>i.id===id);
  item.weeklyLog.splice(idx,1);
  persistItem(item);
  renderList();
  document.getElementById("log-"+id).classList.add("open");
}

function updateField(id, field, value){
  const item = items.find(i=>i.id===id);
  item[field] = value;
  persistItem(item);
  renderSummary();
  renderLocSummary();
  renderRiskPanel();
  if(field==="status" || field==="dueDate" || field==="location") renderList();
  if(field==="location") renderTabs();
}

function handleLocationChange(id, selectEl){
  const item = items.find(i=>i.id===id);
  let val = selectEl.value;
  if(val === "__new__"){
    const name = (prompt("新しい拠点名を入力してください")||"").trim();
    if(!name){ selectEl.value = item.location; return; }
    val = name;
  }
  updateField(id, "location", val);
}

function clearMilestone(id){
  const item = items.find(i=>i.id===id);
  if(!item.milestoneNote) return;
  updateField(id, "milestoneNote", "");
  const input = document.querySelector(`#card-${id} .milestone-input`);
  if(input) input.value = "";
}

function updateCostField(id, field, value){
  const item = items.find(i=>i.id===id);
  item.costSavings = item.costSavings || {annual:null,monthly:null,note:""};
  if(field==="note") item.costSavings.note = value;
  else item.costSavings[field] = value===""? null : Number(value);
  persistItem(item);
}

function addNewTask(){
  const maxId = items.reduce((m,i)=>Math.max(m,i.id),0);
  const newId = maxId+1;
  const defaultLoc = filterLoc!=="すべて"? filterLoc : (getLocations()[0]||"");
  const newItem = {
    id:newId, location:defaultLoc, category:"", title:"新規タスク", assignee:"", dueDate:"",
    milestoneNote:"", content:"", completionCriteria:"", originalLabel:"", status:"未着手",
    latestUpdate:"", risk:"", weeklyLog:[], links:[]
  };
  items.push(newItem);
  filterStatus.add("未着手");
  saveState();
  if(spEnabled){ spSaveItem(newItem).catch(e=>{ console.warn("SharePoint登録に失敗しました", e); setSyncStatus("error"); }); }
  renderAll();
  setTimeout(()=>{
    const card = document.getElementById("card-"+newId);
    if(card) card.scrollIntoView({behavior:"smooth", block:"center"});
    const titleInput = document.querySelector(`#card-${newId} .title-input`);
    if(titleInput){ titleInput.focus(); titleInput.select(); }
  }, 50);
}

function deleteTask(id){
  if(!confirm("このタスクを削除します。よろしいですか？（元に戻せません）")) return;
  items = items.filter(i=>i.id!==id);
  saveState();
  if(spEnabled){ spDeleteItem(id).catch(e=>{ console.warn("SharePoint削除に失敗しました", e); setSyncStatus("error"); }); }
  renderAll();
}

function exportJSON(){
  const blob = new Blob([JSON.stringify(items,null,2)], {type:"application/json"});
  const url = URL.createObjectURL(blob);
  const a = document.createElement("a");
  const today = new Date();
  const stamp = `${today.getFullYear()}${String(today.getMonth()+1).padStart(2,'0')}${String(today.getDate()).padStart(2,'0')}`;
  a.href = url; a.download = `factory_dashboard_${stamp}.json`;
  a.click();
  URL.revokeObjectURL(url);
}

function importJSON(evt){
  const file = evt.target.files[0];
  if(!file) return;
  const reader = new FileReader();
  reader.onload = e=>{
    try{
      const data = JSON.parse(e.target.result);
      if(!Array.isArray(data)) throw new Error("invalid");
      const oldIds = items.map(i=>i.id);
      items = data;
      saveState();
      if(spEnabled){
        (async()=>{
          for(const id of oldIds){ await spDeleteItem(id).catch(()=>{}); }
          for(const it of items){ await spSaveItem(it).catch(()=>{}); }
        })();
      }
      renderAll();
    }catch(err){ alert("読み込みに失敗しました。JSON形式を確認してください。"); }
  };
  reader.readAsText(file);
  evt.target.value = "";
}

function resetData(){
  const msg = spEnabled
    ? "SharePoint上の共有データも含めて、全員分のデータが初期状態に戻ります。本当によろしいですか？"
    : "編集内容をすべて破棄し、初期データに戻します。よろしいですか？";
  if(!confirm(msg)) return;
  const oldIds = items.map(i=>i.id);
  items = JSON.parse(JSON.stringify(DEFAULT_ITEMS));
  saveState();
  if(spEnabled){
    (async()=>{
      for(const id of oldIds){ await spDeleteItem(id).catch(()=>{}); }
      for(const it of items){ await spSaveItem(it).catch(()=>{}); }
    })();
  }
  renderAll();
}

function renderAll(){
  renderSummary();
  renderLocSummary();
  renderRiskPanel();
  renderTabs();
  renderList();
}

// ---- 添付ファイル（アップロード：IndexedDB） ----
const ATTACH_DB_NAME = "factory_dashboard_files";
const ATTACH_STORE = "attachments";
let fileAttachments = [];
let attachDbAvailable = true;
let dbPromise = null;
const objectUrlCache = {};

function openAttachDB(){
  if(dbPromise) return dbPromise;
  dbPromise = new Promise((resolve,reject)=>{
    if(!window.indexedDB){ reject(new Error("no indexeddb")); return; }
    const req = indexedDB.open(ATTACH_DB_NAME, 1);
    req.onupgradeneeded = e=>{
      const db = e.target.result;
      if(!db.objectStoreNames.contains(ATTACH_STORE)){
        const store = db.createObjectStore(ATTACH_STORE, {keyPath:"id", autoIncrement:true});
        store.createIndex("itemId","itemId",{unique:false});
      }
    };
    req.onsuccess = e=> resolve(e.target.result);
    req.onerror = e=> reject(e.target.error);
  });
  return dbPromise;
}
function dbAdd(record){
  return openAttachDB().then(db=> new Promise((resolve,reject)=>{
    const tx = db.transaction(ATTACH_STORE,"readwrite");
    const req = tx.objectStore(ATTACH_STORE).add(record);
    req.onsuccess = ()=> resolve(req.result);
    req.onerror = ()=> reject(req.error);
  }));
}
function dbDelete(id){
  return openAttachDB().then(db=> new Promise((resolve,reject)=>{
    const tx = db.transaction(ATTACH_STORE,"readwrite");
    const req = tx.objectStore(ATTACH_STORE).delete(id);
    req.onsuccess = ()=> resolve();
    req.onerror = ()=> reject(req.error);
  }));
}
function dbGetAll(){
  return openAttachDB().then(db=> new Promise((resolve,reject)=>{
    const tx = db.transaction(ATTACH_STORE,"readonly");
    const req = tx.objectStore(ATTACH_STORE).getAll();
    req.onsuccess = ()=> resolve(req.result);
    req.onerror = ()=> reject(req.error);
  }));
}

function fileAttachmentsFor(itemId){ return fileAttachments.filter(a=>a.itemId===itemId); }

function humanSize(bytes){
  if(bytes<1024) return bytes+"B";
  if(bytes<1024*1024) return (bytes/1024).toFixed(1)+"KB";
  return (bytes/1024/1024).toFixed(1)+"MB";
}

function fileIcon(type,name){
  if(type.startsWith("image/")) return "🖼️";
  if(type.includes("pdf")) return "📕";
  if(/\.(xlsx|xls|csv)$/i.test(name)) return "📊";
  if(/\.(docx|doc)$/i.test(name)) return "📄";
  return "📎";
}

async function handleFileSelect(itemId, evt){
  const files = Array.from(evt.target.files||[]);
  evt.target.value = "";
  for(const file of files){
    if(file.size > 30*1024*1024){
      alert(`${file.name} は30MBを超えるため追加できません`);
      continue;
    }
    let thumbDataUrl = null;
    if(file.type.startsWith("image/")){
      thumbDataUrl = await makeThumbnail(file).catch(()=>null);
    }
    const record = {itemId, name:file.name, type:file.type||"application/octet-stream", size:file.size, blob:file, thumbDataUrl, addedDate:new Date().toLocaleDateString('ja-JP')};
    try{
      const id = await dbAdd(record);
      record.id = id;
      fileAttachments.push(record);
    }catch(e){ alert("添付ファイルの保存に失敗しました: "+file.name); }
  }
  refreshAttachSection(itemId);
}

function makeThumbnail(file){
  return new Promise((resolve,reject)=>{
    const img = new Image();
    const url = URL.createObjectURL(file);
    img.onload = ()=>{
      const maxDim = 240;
      const scale = Math.min(1, maxDim/Math.max(img.width,img.height));
      const w = Math.round(img.width*scale), h = Math.round(img.height*scale);
      const canvas = document.createElement("canvas");
      canvas.width=w; canvas.height=h;
      canvas.getContext("2d").drawImage(img,0,0,w,h);
      URL.revokeObjectURL(url);
      resolve(canvas.toDataURL("image/jpeg",0.8));
    };
    img.onerror = e=>{ URL.revokeObjectURL(url); reject(e); };
    img.src = url;
  });
}

async function removeFile(itemId, id){
  if(!confirm("この添付ファイルを削除しますか？")) return;
  try{ await dbDelete(id); }catch(e){}
  fileAttachments = fileAttachments.filter(a=>a.id!==id);
  if(objectUrlCache[id]){ URL.revokeObjectURL(objectUrlCache[id]); delete objectUrlCache[id]; }
  refreshAttachSection(itemId);
}

function getObjectUrl(id){
  if(objectUrlCache[id]) return objectUrlCache[id];
  const rec = fileAttachments.find(a=>a.id===id);
  if(!rec) return null;
  const url = URL.createObjectURL(rec.blob);
  objectUrlCache[id] = url;
  return url;
}

function openLightbox(id){
  const url = getObjectUrl(id);
  if(!url) return;
  document.getElementById("lightboxImg").src = url;
  document.getElementById("lightbox").classList.add("open");
}
function closeLightbox(){ document.getElementById("lightbox").classList.remove("open"); }

function downloadAttachment(id){
  const rec = fileAttachments.find(a=>a.id===id);
  if(!rec) return;
  const url = getObjectUrl(id);
  const a = document.createElement("a");
  a.href = url; a.download = rec.name;
  a.click();
}

// ---- 添付ファイル（クラウドリンク） ----
function linkIcon(url){
  try{
    const host = new URL(url).hostname;
    if(host.includes("drive.google.com") || host.includes("docs.google.com")) return "🟢";
    if(host.includes("sharepoint.com") || host.includes("onedrive")) return "🔵";
    if(host.includes("dropbox.com")) return "📦";
    if(host.includes("box.com")) return "🟦";
  }catch(e){}
  return "🔗";
}

function addLink(itemId){
  const labelEl = document.getElementById("al-"+itemId);
  const urlEl = document.getElementById("au-"+itemId);
  const label = labelEl.value.trim();
  let url = urlEl.value.trim();
  if(!url) return;
  if(!/^https?:\/\//i.test(url)) url = "https://"+url;
  try{ new URL(url); }catch(e){ alert("URLの形式が正しくありません"); return; }
  const item = items.find(i=>i.id===itemId);
  item.links = item.links||[];
  item.links.push({label, url});
  persistItem(item);
  labelEl.value=""; urlEl.value="";
  refreshAttachSection(itemId);
}

function removeLink(itemId, idx){
  if(!confirm("この添付リンクを削除しますか？")) return;
  const item = items.find(i=>i.id===itemId);
  item.links.splice(idx,1);
  persistItem(item);
  refreshAttachSection(itemId);
}

// ---- 添付欄の描画（ファイル＋リンク） ----
function attachHtml(item){
  const files = fileAttachmentsFor(item.id);
  let filesHtml;
  if(!attachDbAvailable){
    filesHtml = `<div class="attach-empty">このブラウザではファイル添付機能が利用できません</div>`;
  }else{
    filesHtml = (files.length? files.map(a=>{
      if(a.type.startsWith("image/") && a.thumbDataUrl){
        return `<div class="attach-item">
          <img class="attach-thumb" src="${a.thumbDataUrl}" onclick="openLightbox(${a.id})">
          <div class="attach-name" title="${escapeHtml(a.name)}">${escapeHtml(a.name)}</div>
          <div class="attach-size">${humanSize(a.size)}</div>
          <span class="attach-del" onclick="removeFile(${item.id},${a.id})">削除</span>
        </div>`;
      }
      return `<div class="attach-item">
        <div class="attach-file-icon" onclick="downloadAttachment(${a.id})">${fileIcon(a.type,a.name)}</div>
        <div class="attach-name" title="${escapeHtml(a.name)}">${escapeHtml(a.name)}</div>
        <div class="attach-size">${humanSize(a.size)}</div>
        <span class="attach-del" onclick="removeFile(${item.id},${a.id})">削除</span>
      </div>`;
    }).join("") : `<div class="attach-empty">アップロード済みのファイルはまだありません</div>`)
    + `<div style="clear:both"></div>`;
  }
  const fileControls = attachDbAvailable? `<button class="btn" onclick="document.getElementById('file-${item.id}').click()">📎 ファイルを追加</button>
    <input type="file" id="file-${item.id}" multiple style="display:none" onchange="handleFileSelect(${item.id}, event)">` : "";

  const links = item.links||[];
  const linksHtml = links.length? links.map((l,idx)=>`
    <div class="attach-row">
      <span class="attach-icon">${linkIcon(l.url)}</span>
      <a href="${escapeHtml(l.url)}" target="_blank" rel="noopener noreferrer">${escapeHtml(l.label||l.url)}</a>
      <span class="attach-url">${escapeHtml(l.url)}</span>
      <span class="attach-del" onclick="removeLink(${item.id},${idx})">削除</span>
    </div>`).join("") : `<div class="attach-empty">添付リンクはまだありません</div>`;

  return `
    <div class="attach-subtitle">アップロードファイル（写真・データ）</div>
    <div class="attach-files">${filesHtml}</div>
    ${fileControls}
    <div class="attach-subtitle">クラウドリンク（共同編集用）</div>
    <div class="attach-list">${linksHtml}</div>
    <div class="attach-form">
      <input class="label" id="al-${item.id}" placeholder="表示名（例：現場写真）">
      <input class="url" id="au-${item.id}" placeholder="https://drive.google.com/... など">
      <button class="btn" onclick="addLink(${item.id})">＋ リンクを追加</button>
    </div>`;
}

function refreshAttachSection(itemId){
  const el = document.getElementById("attach-"+itemId);
  const item = items.find(i=>i.id===itemId);
  if(el && item) el.innerHTML = attachHtml(item);
}

// ---- PowerPoint資料作成 ----
const PPTX_NAVY = "1E2761", PPTX_TEXT = "222A4D", PPTX_MUTED = "6B7591", PPTX_BORDER = "E4E8F2";
const PPTX_SHADOW = {type:"outer", color:PPTX_NAVY, opacity:0.1, blur:8, offset:2, angle:90};

function pptxFmtDate(iso){
  if(!iso) return "未設定";
  const d = new Date(iso+"T00:00:00");
  if(isNaN(d.getTime())) return "未設定";
  return `${d.getFullYear()}/${d.getMonth()+1}/${d.getDate()}`;
}

function blobToDataURL(blob){
  return new Promise((resolve,reject)=>{
    const reader = new FileReader();
    reader.onload = ()=> resolve(reader.result);
    reader.onerror = reject;
    reader.readAsDataURL(blob);
  });
}

// PowerPointが「コンテンツに問題」と判定しないよう、テキストを安全な文字列に正規化する
// （制御文字の除去、異常な長文のトリミング）
function safePptxText(value, maxLen){
  let s = (value===null || value===undefined) ? "" : String(value);
  // タブ・改行以外の制御文字（不可視のゴミ文字）を除去
  s = s.replace(/[\x00-\x08\x0B\x0C\x0E-\x1F\x7F]/g, "");
  const limit = maxLen || 600;
  if(s.length > limit) s = s.slice(0, limit) + "…（全文はダッシュボードを参照）";
  return s;
}

// http/https の絶対URLのみを許可する（それ以外はハイパーリンク化しない）
function safePptxUrl(url){
  try{
    const u = new URL(String(url||""));
    if(u.protocol==="http:" || u.protocol==="https:") return u.href;
  }catch(e){}
  return null;
}

const PPTX_SAFE_IMAGE_TYPES = ["image/png","image/jpeg","image/jpg","image/gif"];

const PPTX_FONT = "游ゴシック";
const PPTX_INK = "3A3F4B";
const PPTX_RULE = "E1E5EE";

function pptxCard(slide, x, y, w, h){
  slide.addShape("roundRect", {x, y, w, h, fill:{color:"FFFFFF"}, line:{color:"EDEFF5", width:1}, rectRadius:0.05, shadow:PPTX_SHADOW});
}

// 罫線（セクション間の仕切り線）
function addDivider(slide, x, y, w){
  slide.addShape("rect", {x, y, w, h:0.012, fill:{color:PPTX_RULE}, line:{type:"none"}});
}

// 全角文字を1emとして概算し、折り返し後の行数からテキストの必要高さ(インチ)を見積もる
// 実際のレンダリングよりやや厳しめ（安全側）に取り、重なりが再発しないよう常に余裕を残す
function estimateBodyHeight(text, widthIn, fontSizePt){
  const SAFETY_WIDTH_FACTOR = 1.18;
  const charWidthIn = (fontSizePt/72) * SAFETY_WIDTH_FACTOR;
  const charsPerLine = Math.max(5, Math.floor(widthIn/charWidthIn));
  const paras = String(text||"-").split(/\n/);
  let lines = 0;
  paras.forEach(p=>{ lines += Math.max(1, Math.ceil(p.length/charsPerLine)); });
  const lineHeightIn = (fontSizePt/72)*1.4;
  return lines*lineHeightIn + 0.08;
}

function headingHeight(fontSizePt){
  return (fontSizePt/72)*1.3 + 0.1;
}

function estimateSectionHeight(text, widthIn, fontSizePt){
  return headingHeight(fontSizePt) + estimateBodyHeight(text, widthIn, fontSizePt);
}

// 見出し（色付きアクセントバー＋ラベル）と本文を分けて配置する、見やすさ重視のセクション描画
function addSectionBlock(slide, label, text, x, y, w, h, accentColor, fontSize){
  const headH = headingHeight(fontSize);
  slide.addShape("rect", {x, y:y+0.02, w:0.045, h:headH-0.14, fill:{color:accentColor}, line:{type:"none"}});
  slide.addText(label, {x:x+0.16, y, w:w-0.16, h:headH, fontSize, bold:true, color:accentColor, fontFace:PPTX_FONT, valign:"top", margin:0});
  slide.addText(text||"-", {x, y:y+headH, w, h:Math.max(0.2,h-headH), fontSize, color:PPTX_INK, fontFace:PPTX_FONT, valign:"top", lineSpacingMultiple:1.4, margin:0});
}

// 内容/完了条件/最新の進捗/リスクの4項目を、テキスト量に応じたフォントサイズと行の高さで配置する
function computeItemLayout(item, innerW, colW, availH){
  const candidates = [14, 13, 12, 11, 10, 9, 8];
  const bottomReserve = 0.9; // フォントを縮小するか判断する際に確保したい最低限の下段スペース
  const bottomFloor = 0.6;   // 最終的に下段へ割り当てる最低の高さ（カード外にはみ出さないよう抑える）
  const rowGap = 0.28;
  let chosen = null;
  for(const fs of candidates){
    const row1H = Math.max(estimateSectionHeight(item.content, innerW, fs), 0.5);
    const h2L = estimateSectionHeight(item.completionCriteria, colW, fs);
    const h2R = estimateSectionHeight(item.risk||"リスクなし", colW, fs);
    const row2H = Math.max(h2L, h2R, 0.5);
    const row3H = Math.max(estimateSectionHeight(item.latestUpdate, innerW, fs), 0.5);
    const total = row1H+rowGap+row2H+rowGap+row3H+rowGap+bottomReserve;
    chosen = {fs, row1H, row2H, row3H, rowGap, fits: total<=availH};
    if(chosen.fits || fs===candidates[candidates.length-1]) break;
  }
  const used = chosen.row1H+chosen.rowGap+chosen.row2H+chosen.rowGap+chosen.row3H+chosen.rowGap;
  chosen.bottomH = Math.max(bottomFloor, availH-used);
  return chosen;
}

function addCostVisualization(slide, cost, x, y, w, h){
  slide.addText("削減コストの可視化", {x, y, w, h:0.28, fontSize:12, bold:true, color:PPTX_NAVY, fontFace:PPTX_FONT, margin:0});
  const hasData = cost && (cost.annual || cost.monthly);
  if(!hasData){
    slide.addText("コスト削減効果は未算出です", {x, y:y+0.3, w, h:h-0.3, fontSize:12, color:"9CA3AF", italic:true, fontFace:PPTX_FONT, valign:"middle", margin:0});
    return;
  }
  const monthly = cost.monthly || Math.round((cost.annual||0)/12);
  const annual = cost.annual || (monthly*12);
  const colW = (w-0.3)/2;
  slide.addText(`${monthly.toLocaleString()}円`, {x, y:y+0.34, w:colW, h:0.48, fontSize:24, bold:true, color:PPTX_TEXT, fontFace:PPTX_FONT, margin:0});
  slide.addText("月間削減効果", {x, y:y+0.82, w:colW, h:0.26, fontSize:10.5, color:PPTX_MUTED, fontFace:PPTX_FONT, margin:0});
  slide.addShape("rect", {x:x+colW+0.14, y:y+0.32, w:0.012, h:0.75, fill:{color:PPTX_RULE}, line:{type:"none"}});
  slide.addText(`${annual.toLocaleString()}円`, {x:x+colW+0.3, y:y+0.34, w:colW, h:0.48, fontSize:24, bold:true, color:PPTX_TEXT, fontFace:PPTX_FONT, margin:0});
  slide.addText("年間削減効果", {x:x+colW+0.3, y:y+0.82, w:colW, h:0.26, fontSize:10.5, color:PPTX_MUTED, fontFace:PPTX_FONT, margin:0});
  const statsBottom = y+0.82+0.26; // 月間/年間の数値・キャプションが占める範囲の下端
  if(cost.note && (y+h) - statsBottom >= 0.34){
    slide.addText(cost.note, {x, y:statsBottom+0.06, w, h:(y+h)-statsBottom-0.06, fontSize:9.5, italic:true, color:"9CA3AF", fontFace:PPTX_FONT, margin:0, valign:"top"});
  }
}

async function addSideExtras(slide, item, x, y, w, h){
  const files = fileAttachmentsFor(item.id)
    .filter(f=> PPTX_SAFE_IMAGE_TYPES.includes((f.type||"").toLowerCase()) && f.blob && f.blob.size>0 && f.blob.size<15*1024*1024)
    .slice(0,2);
  const links = (item.links||[]).map(l=>({label:l.label, url:safePptxUrl(l.url)})).filter(l=>l.url).slice(0,3);
  let cy = y;
  if(files.length){
    slide.addText("写真", {x, y:cy, w, h:0.24, fontSize:10.5, bold:true, color:PPTX_NAVY, fontFace:PPTX_FONT, margin:0});
    cy += 0.27;
    const thumbW = Math.min(1.6, (w-0.2)/files.length);
    let cx = x;
    for(const f of files){
      try{
        const dataUrl = await blobToDataURL(f.blob);
        if(!/^data:image\/(png|jpe?g|gif);base64,/i.test(dataUrl)) throw new Error("unsupported image data");
        slide.addImage({data:dataUrl, x:cx, y:cy, w:thumbW, h:thumbW*0.75, sizing:{type:"cover", w:thumbW, h:thumbW*0.75}, rounding:true});
      }catch(e){ console.warn("画像の埋め込みをスキップしました", item.id, e); }
      cx += thumbW+0.15;
    }
    cy += thumbW*0.75+0.2;
  }
  if(links.length){
    slide.addText("🔗 関連資料（クリックで開く）", {x, y:cy, w, h:0.24, fontSize:10.5, bold:true, color:PPTX_NAVY, fontFace:PPTX_FONT, margin:0});
    cy += 0.27;
    links.forEach(l=>{
      const label = safePptxText(l.label||l.url, 60);
      const shortLabel = label.length>26? label.slice(0,25)+"…" : label;
      slide.addText(shortLabel, {x, y:cy, w, h:0.25, fontSize:10.5, color:"1155CC", underline:true, fontFace:PPTX_FONT, hyperlink:{url:l.url}, margin:0});
      cy += 0.27;
    });
  }
}

async function addItemSlide(pptx, rawItem){
  const item = {
    ...rawItem,
    location: safePptxText(rawItem.location, 40),
    category: safePptxText(rawItem.category, 40),
    assignee: safePptxText(rawItem.assignee, 60),
    title: safePptxText(rawItem.title, 80),
    status: safePptxText(rawItem.status, 20),
    milestoneNote: safePptxText(rawItem.milestoneNote, 120),
    content: safePptxText(rawItem.content, 320),
    completionCriteria: safePptxText(rawItem.completionCriteria, 320),
    latestUpdate: safePptxText(rawItem.latestUpdate, 380),
    risk: safePptxText(rawItem.risk, 320)
  };

  const slide = pptx.addSlide();
  slide.background = {color:"F4F6FB"};

  slide.addShape("roundRect", {x:0.55, y:0.4, w:3.2, h:0.5, fill:{color:PPTX_NAVY}, rectRadius:0.19});
  slide.addText(item.location||"-", {x:0.55, y:0.4, w:3.2, h:0.5, align:"center", valign:"middle", fontSize:14, bold:true, color:"FFFFFF", fontFace:PPTX_FONT, margin:0});

  const sc = STATUS_HEX[rawItem.status] || STATUS_HEX["未着手"];
  slide.addShape("roundRect", {x:11.2, y:0.4, w:2.0, h:0.5, fill:{color:sc.bg}, line:{color:sc.border, width:1}, rectRadius:0.19});
  slide.addText(item.status||"-", {x:11.2, y:0.4, w:2.0, h:0.5, align:"center", valign:"middle", fontSize:13, bold:true, color:sc.border, fontFace:PPTX_FONT, margin:0});

  slide.addText(`ID ${item.id}　${item.title||""}`, {x:0.55, y:1.05, w:12.2, h:0.5, fontSize:23, bold:true, color:"1A1F36", fontFace:PPTX_FONT, margin:0});
  slide.addText(`分類：${item.category||"-"}　｜　担当：${item.assignee||"-"}　｜　目標期限：${pptxFmtDate(item.dueDate)}`, {x:0.55, y:1.55, w:12.2, h:0.3, fontSize:13, color:PPTX_MUTED, fontFace:PPTX_FONT, margin:0});

  let cardY = 1.95;
  if(item.milestoneNote){
    slide.addText(`📌 ${item.milestoneNote}`, {x:0.55, y:1.85, w:12.2, h:0.28, fontSize:11, color:"B45309", fontFace:PPTX_FONT, margin:0});
    cardY = 2.18;
  }

  const cardX = 0.55, cardW = 12.2, cardH = 7.5-cardY-0.3;
  pptxCard(slide, cardX, cardY, cardW, cardH);

  const padX = cardX+0.4, innerW = cardW-0.8, gapX = 0.45, colW = (innerW-gapX)/2, rightX = padX+colW+gapX;
  const topPad = 0.3, bottomPad = 0.3;
  const availH = cardH - topPad - bottomPad;
  const layout = computeItemLayout(item, innerW, colW, availH);
  const fs = layout.fs;

  let y = cardY+topPad;
  addSectionBlock(slide, "何を（内容）", item.content, padX, y, innerW, layout.row1H, PPTX_NAVY, fs);

  y += layout.row1H + layout.rowGap*0.5;
  addDivider(slide, padX, y, innerW);
  y += layout.rowGap*0.5;
  addSectionBlock(slide, "完了条件", item.completionCriteria, padX, y, colW, layout.row2H, "0F766E", fs);
  addSectionBlock(slide, "リスク・対応", item.risk||"リスクなし", rightX, y, colW, layout.row2H, "B45309", fs);

  y += layout.row2H + layout.rowGap*0.5;
  addDivider(slide, padX, y, innerW);
  y += layout.rowGap*0.5;
  addSectionBlock(slide, "最新の進捗", item.latestUpdate, padX, y, innerW, layout.row3H, PPTX_NAVY, fs);

  y += layout.row3H + layout.rowGap*0.5;
  addDivider(slide, padX, y, innerW);
  y += layout.rowGap*0.5;
  const bottomH = layout.bottomH;
  addCostVisualization(slide, item.costSavings, padX, y, colW, bottomH);
  await addSideExtras(slide, item, rightX, y, colW, bottomH);
}

function addSummarySlide(pptx, locs, items){
  const slide = pptx.addSlide();
  slide.background = {color:"F4F6FB"};
  slide.addText("全体サマリー", {x:0.55, y:0.1, w:8, h:0.55, fontSize:30, bold:true, color:PPTX_NAVY, fontFace:PPTX_FONT});
  const today = new Date();
  slide.addText(`指摘事項　全${items.length}件の進捗状況（${today.getFullYear()}/${today.getMonth()+1}/${today.getDate()}時点）`,
    {x:0.55, y:0.63, w:10, h:0.35, fontSize:15, color:PPTX_MUTED, fontFace:PPTX_FONT});

  const totalCardW = 1.75, tileGap = 0.18;
  pptxCard(slide, 0.55, 1.1, totalCardW, 1.45);
  slide.addText(String(items.length), {x:0.55, y:1.18, w:totalCardW, h:0.75, align:"center", fontSize:38, bold:true, color:PPTX_NAVY, fontFace:PPTX_FONT});
  slide.addText("合計", {x:0.55, y:1.95, w:totalCardW, h:0.35, align:"center", fontSize:13, color:PPTX_MUTED, fontFace:PPTX_FONT});

  const tilesX = 0.55+totalCardW+tileGap;
  const tileW = (12.2-totalCardW-tileGap*7)/6;
  STATUS_STAGES.forEach((s,i)=>{
    const x = tilesX + i*(tileW+tileGap);
    const sc = STATUS_HEX[s];
    const n = items.filter(it=>it.status===s).length;
    pptxCard(slide, x, 1.1, tileW, 1.45);
    slide.addText(String(n), {x, y:1.18, w:tileW, h:0.75, align:"center", fontSize:32, bold:true, color:sc.border, fontFace:PPTX_FONT});
    slide.addText(s, {x, y:1.95, w:tileW, h:0.5, align:"center", fontSize:10.5, color:PPTX_MUTED, fontFace:PPTX_FONT});
  });

  slide.addText("拠点別　進捗状況", {x:0.55, y:2.85, w:5.5, h:0.35, fontSize:15, bold:true, color:PPTX_TEXT, fontFace:PPTX_FONT});
  let ly = 3.35;
  locs.forEach(loc=>{
    const list = items.filter(i=>i.location===loc);
    const total = list.length || 1;
    slide.addText(`${safePptxText(loc,40)}（${list.length}件）`, {x:0.55, y:ly, w:5.5, h:0.3, fontSize:12.5, bold:true, color:PPTX_TEXT, fontFace:PPTX_FONT});
    let bx = 0.55;
    const barW = 5.5, barH = 0.22;
    STATUS_STAGES.forEach(s=>{
      const n = list.filter(i=>i.status===s).length;
      if(!n) return;
      const w = barW*(n/total);
      slide.addShape("rect", {x:bx, y:ly+0.32, w, h:barH, fill:{color:STATUS_HEX[s].border}, line:{type:"none"}});
      bx += w;
    });
    slide.addText(`完了 ${list.filter(i=>i.status==="完了").length}/${list.length}`, {x:0.55, y:ly+0.56, w:5.5, h:0.25, fontSize:10, color:PPTX_MUTED, fontFace:PPTX_FONT});
    ly += 1.0;
  });

  slide.addText("全体コスト削減状況", {x:7.4, y:2.85, w:5, h:0.35, fontSize:15, bold:true, color:PPTX_TEXT, fontFace:PPTX_FONT});
  let totalMonthly = 0, totalAnnual = 0;
  items.forEach(i=>{
    const cs = i.costSavings;
    if(cs && (cs.monthly||cs.annual)){
      totalMonthly += cs.monthly || Math.round((cs.annual||0)/12);
      totalAnnual += cs.annual || ((cs.monthly||0)*12);
    }
  });
  slide.addText("月間", {x:7.4, y:3.45, w:1, h:0.4, fontSize:15, bold:true, color:PPTX_TEXT, fontFace:PPTX_FONT});
  slide.addText(`${totalMonthly.toLocaleString()}円`, {x:8.4, y:3.4, w:4, h:0.55, fontSize:32, bold:true, underline:true, color:PPTX_TEXT, fontFace:PPTX_FONT});
  slide.addText("年間", {x:7.4, y:4.15, w:1, h:0.4, fontSize:15, bold:true, color:PPTX_TEXT, fontFace:PPTX_FONT});
  slide.addText(`${totalAnnual.toLocaleString()}円`, {x:8.4, y:4.1, w:4, h:0.55, fontSize:32, bold:true, underline:true, color:PPTX_TEXT, fontFace:PPTX_FONT});
  slide.addText("※各項目の「削減コスト」欄に入力された金額の合計です", {x:7.4, y:4.75, w:5, h:0.3, fontSize:9.5, italic:true, color:"9CA3AF", fontFace:PPTX_FONT});
}

async function generatePptx(){
  if(typeof PptxGenJS === "undefined"){
    alert("PowerPoint出力にはインターネット接続が必要です。接続環境を確認してください。");
    return;
  }
  const btn = document.getElementById("pptxBtn");
  const origLabel = btn.textContent;
  btn.textContent = "作成中…";
  btn.disabled = true;
  try{
    const pptx = new PptxGenJS();
    pptx.defineLayout({name:"WIDE", width:13.33, height:7.5});
    pptx.layout = "WIDE";
    const locs = getLocations();

    const cover = pptx.addSlide();
    cover.background = {color:PPTX_NAVY};
    cover.addText("商品管理部　工場改善進捗報告", {x:0.9, y:2.5, w:11.5, h:0.9, fontSize:32, bold:true, color:"FFFFFF", fontFace:PPTX_FONT});
    cover.addText("視察指摘事項　アクションプラン進捗", {x:0.9, y:3.3, w:11.5, h:0.5, fontSize:18, color:"CADCFC", fontFace:PPTX_FONT});
    cover.addText(`対象拠点：${locs.map(l=>safePptxText(l,40)).join("／")}`, {x:0.9, y:4.0, w:11.5, h:0.4, fontSize:13, color:"CADCFC", fontFace:PPTX_FONT});
    const today = new Date();
    cover.addText(`${today.getFullYear()}年${today.getMonth()+1}月${today.getDate()}日 出力`, {x:0.9, y:6.6, w:6, h:0.4, fontSize:12, color:"CADCFC", fontFace:PPTX_FONT});

    addAgendaSlide(pptx, locs, items);
    addSummarySlide(pptx, locs, items);

    const sorted = items.slice().sort((a,b)=>{
      const la = locs.indexOf(a.location), lb = locs.indexOf(b.location);
      return la!==lb? la-lb : a.id-b.id;
    });
    const skipped = [];
    for(const item of sorted){
      try{
        await addItemSlide(pptx, item);
      }catch(e){
        console.warn("スライド作成をスキップしました（データに問題がある可能性）", item.id, e);
        skipped.push(item.id);
      }
    }
    if(skipped.length){
      console.warn(`ID ${skipped.join(", ")} のスライドを作成できませんでした`);
    }

    const stamp = `${today.getFullYear()}${String(today.getMonth()+1).padStart(2,'0')}${String(today.getDate()).padStart(2,'0')}`;
    await pptx.writeFile({fileName:`工場改善進捗報告_${stamp}.pptx`});
    if(skipped.length){
      alert(`一部の項目（ID ${skipped.join(", ")}）はデータの問題によりスライドを作成できませんでした。それ以外は正常に出力されています。`);
    }
  }catch(e){
    console.error(e);
    alert("PowerPoint資料の作成に失敗しました。もう一度お試しください。");
  }finally{
    btn.textContent = origLabel;
    btn.disabled = false;
  }
}
